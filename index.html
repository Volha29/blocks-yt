<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Blocks variety of figures</title>
        <script src="https://www.youtube.com/game_api/v1"></script>

        <style>
           @font-face {
                font-family: 'EXO2';
                src: url('assets/exo2.ttf') format('truetype');
            }  
           
            /* Reset CSS: Please avoid making changes here unless you know what you're doing :) */
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
    
            html, body {
                width: 100%;
                height: 100%;
                margin: 0; 
                padding: 0;    
                overflow: hidden;
            }
    
            body {                
                line-height: 1;
                font-family: Verdana, Tahoma, Geneva, sans-serif;
                background-color: #CCBCB2;
            }

            #game-container {
                opacity: 0; 
                background-color: transparent !important;             
                width: 100vw; 
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            canvas {
                background-color: transparent !important; 
                display: block;
                touch-action: none; 
            }
                
            ol, ul {
                list-style: none;
            }
    
            img, video {
                max-width: 100%;
                height: auto;
                display: block;
            }
    
            a {
                text-decoration: none;
                color: inherit;
            }

            .font-preloader {
                position: absolute;
                font-family: 'EXO2';
                opacity: 0;
                pointer-events: none;
            }
            
        </style>
    </head>
    <body>
        <div class="font-preloader">.</div>

        <div id="game-container"></div>
        <script src="./phaser.min.js"></script>
        <script type="module" src="./src/main.js"></script>        
    </body>
    </html>
